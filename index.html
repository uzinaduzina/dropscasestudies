<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DROPS Case Studies</title>
    <link rel="stylesheet" href="./standalone-case-studies.css" />
  </head>
  <body data-page="cards">
    <div class="page-shell">
      <section class="logo-strip" aria-label="Project logos">
        <div class="logo-strip-track">
          <a class="project-logo-link" href="./index.html" aria-label="DROPS">
            <img class="project-logo" src="./drops-logo.png" alt="DROPS logo" />
          </a>
          <div class="partner-logo-slot">EU logo</div>
          <div class="partner-logo-slot">Partner logo</div>
          <div class="partner-logo-slot">Partner logo</div>
        </div>
      </section>

      <header class="topbar topbar-simple">
        <div></div>

        <div class="toolbar">
          <label class="select-block" for="cards-language-select">
            <span id="cards-language-label"></span>
            <select id="cards-language-select"></select>
          </label>
        </div>
      </header>

      <main class="content-stack">
        <section class="cards-grid" id="case-study-grid"></section>
        <p class="empty-state hidden" id="cards-empty-state"></p>
      </main>
    </div>

    <script src="./case-studies-data.js"></script>
    <script src="./case-studies-app.js"></script>
  </body>
</html>
